{% extends 'base.html' %}
{% block title %}Eliminar Producto{% endblock %}
{% block page_title %}Eliminar Producto{% endblock %}
{% block content %}
<div class="max-w-md">
  <div class="card text-center">
    <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <i data-lucide="alert-triangle" class="w-7 h-7 text-red-600"></i>
    </div>
    <h2 class="text-lg font-bold text-slate-900 mb-2">¿Eliminar producto?</h2>
    <p class="text-slate-600 text-sm mb-6">¿Eliminar <strong class="text-slate-900">{{ product.name }}</strong>? El producto será ocultado del catálogo.</p>
    <form method="post" class="flex justify-center gap-3">
      {% csrf_token %}
      <a href="{% url 'product_list' %}" class="btn-secondary">Cancelar</a>
      <button type="submit" class="btn-danger">Sí, eliminar</button>
    </form>
  </div>
</div>
{% endblock %}
