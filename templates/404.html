<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página no encontrada · Constructor Express</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 90'><rect x='0' y='0' width='100' height='90' rx='18' fill='%231d3461'/><path d='M18 64 Q18 24 50 24 Q82 24 82 64 Z' fill='%23fbbf24'/><rect x='10' y='61' width='80' height='13' rx='6' fill='%23e07a1f'/><path d='M30 61 Q50 55 70 61' fill='none' stroke='%23d97706' stroke-width='3'/></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', sans-serif; }
    [data-lucide] { display: inline-block; flex-shrink: 0; }
    .bg-page {
      background-color: #f5f6f9;
      background-image: radial-gradient(circle, #d0d8ea 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
    }
  </style>
</head>
<body class="bg-page flex items-center justify-center p-6">

  <div class="text-center max-w-md w-full">

    <!-- Icono -->
    <div class="w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl"
         style="background:linear-gradient(135deg,#1d3461,#25407a)">
      <i data-lucide="hard-hat" class="w-12 h-12 text-white"></i>
    </div>

    <!-- Número de error -->
    <p class="text-8xl font-black tracking-tighter mb-2" style="color:#e8eef8;-webkit-text-stroke:2px #c5d2e8">404</p>

    <h1 class="text-2xl font-black text-slate-800 mb-3 tracking-tight">Página no encontrada</h1>
    <p class="text-slate-500 mb-8 leading-relaxed">
      Esta obra aún no está construida o fue demolida.<br>
      Verifica la dirección o vuelve al inicio.
    </p>

    <!-- Acciones -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}"
           class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-sm text-white transition-all"
           style="background:linear-gradient(135deg,#1d3461,#25407a);box-shadow:0 4px 14px rgba(29,52,97,0.35)"
           onmouseover="this.style.boxShadow='0 6px 20px rgba(29,52,97,0.5)';this.style.transform='translateY(-1px)'"
           onmouseout="this.style.boxShadow='0 4px 14px rgba(29,52,97,0.35)';this.style.transform='translateY(0)'">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          Ir al Dashboard
        </a>
      {% else %}
        <a href="{% url 'landing' %}"
           class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold text-sm text-white transition-all"
           style="background:linear-gradient(135deg,#1d3461,#25407a);box-shadow:0 4px 14px rgba(29,52,97,0.35)"
           onmouseover="this.style.boxShadow='0 6px 20px rgba(29,52,97,0.5)';this.style.transform='translateY(-1px)'"
           onmouseout="this.style.boxShadow='0 4px 14px rgba(29,52,97,0.35)';this.style.transform='translateY(0)'">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          Volver al inicio
        </a>
      {% endif %}
      <button onclick="history.back()"
              class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm transition-all bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300">
        <i data-lucide="undo-2" class="w-4 h-4"></i>
        Página anterior
      </button>
    </div>

    <p class="text-slate-400 text-xs mt-8">Constructor Express © {% now "Y" %} · Hecho en Chile 🇨🇱</p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
