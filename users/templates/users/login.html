<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Constructor Express</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Plus Jakarta Sans',sans-serif;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <h1 class="text-3xl font-bold text-white">Constructor <span class="text-blue-400">Express</span></h1>
      <p class="text-slate-400 mt-2 text-sm">Presupuestos profesionales para contratistas chilenos</p>
    </div>
    <div class="bg-white/5 backdrop-blur-xl rounded-3xl border border-white/10 p-8 shadow-2xl">
      <h2 class="text-xl font-bold text-white mb-6">Iniciar Sesión</h2>
      {% if messages %}{% for m in messages %}<div class="mb-4 text-sm text-red-400 bg-red-400/10 rounded-xl px-4 py-3 border border-red-400/20">{{ m }}</div>{% endfor %}{% endif %}
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-semibold text-slate-300 mb-1.5">Correo electrónico</label>
          <input type="email" name="username" required autofocus class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="tu@email.com">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-300 mb-1.5">Contraseña</label>
          <input type="password" name="password" required class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all duration-200 shadow-lg shadow-blue-600/30">
          Ingresar →
        </button>
      </form>
      <p class="text-center text-slate-400 text-sm mt-6">¿No tienes cuenta? <a href="{% url 'register' %}" class="text-blue-400 hover:text-blue-300 font-semibold">Regístrate gratis</a></p>
    </div>
  </div>
</body>
</html>
